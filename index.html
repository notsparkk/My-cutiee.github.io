<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Manya ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-image: url('roses.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            overflow: hidden; 
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5); 
            z-index: 1;
        }

        /* The title is now completely transparent */
        .page-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            width: 100%;
            opacity: 0; /* Makes the title invisible */
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            margin: 0;
        }

        /* The button is now completely transparent but still clickable! */
        button {
            background-color: transparent;
            color: transparent; /* Invisible text */
            border: transparent; /* Invisible border */
            padding: 25px 60px; /* Made the clickable area slightly larger so it's easier to find */
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 30px; 
            position: relative;
            z-index: 20; 
            /* No shadows or visible background */
        }

        .hide-element {
            display: none !important;
        }

        /* Heart Container Styling */
        .heart-container {
            position: fixed;
            z-index: 5; 
            width: 320px; 
            height: 300px; 
            transform-origin: center;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4)); 
            opacity: 0; 
            animation: fadeInHeart 1.5s forwards ease-out;
            transition: transform 0.3s ease;
        }

        .heart-container:hover {
            transform: scale(1.03) !important; 
            z-index: 15; 
        }

        .heart-shape {
            width: 100%;
            height: 100%;
        }

        /* Message text area perfectly centered in the widest part of the heart */
        .heart-text-area {
            position: absolute;
            top: 15%; 
            left: 15%; 
            width: 70%; 
            height: 50%; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 6; 
        }

        .heart-message {
            font-family: 'Poppins', sans-serif; 
            color: #333; /* Dark text reads perfectly on light pink */
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.5;
            margin: 0;
            padding: 10px;
            word-wrap: break-word; 
        }

        #final-message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 0, 0, 0.85); 
            backdrop-filter: blur(12px);
            padding: 50px;
            border-radius: 20px;
            border: 2px solid #ffb6c1; /* Light pink border for finale box */
            color: #fff;
            z-index: 100; 
            text-align: center;
            max-width: 80%;
            width: 700px;
            box-shadow: 0 0 40px rgba(255, 182, 193, 0.4);
            opacity: 0;
            visibility: hidden;
            transition: opacity 2s ease, visibility 2s ease; 
        }

        #final-message-box.show-final {
            opacity: 1;
            visibility: visible;
        }

        #final-message-box h2 {
            font-family: 'Great Vibes', cursive;
            color: #ffb6c1; /* Light pink title */
            font-size: 3rem;
            margin-top: 0;
            margin-bottom: 20px;
        }

        #final-message-box p {
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            line-height: 1.8;
            font-weight: 300;
        }

        @keyframes fadeInHeart {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>

        let messageIndex = 0; 
        let audioStarted = false;
        let isFinished = false;

        function addHeart() {
            if (isFinished) return;

            if (!audioStarted) {
                const audio = document.getElementById('love-audio');
                audio.volume = 0.5; 
                audio.play().catch(error => console.log("Audio playback failed."));
                audioStarted = true;
            }

            createHeartWithMessage(messages[messageIndex]);
            messageIndex++;

            if (messageIndex >= messages.length) {
                isFinished = true; 
                triggerGrandFinale();
            }
        }

        function triggerGrandFinale() {
            const btn = document.getElementById('action-btn');
            btn.classList.add('hide-element');

            setTimeout(() => {
                document.getElementById('final-message-box').classList.add('show-final');
            }, 2500);
        }

        function createHeartWithMessage(messageContent) {
            const garden = document.getElementById('heart-garden');
            const heartContainer = document.createElement('div');
            heartContainer.className = 'heart-container';
            
            // Random positioning across the screen
            const randomX = Math.random() * 65 + 5; 
            const randomY = Math.random() * 55 + 10; 
            
            heartContainer.style.left = randomX + 'vw';
            heartContainer.style.top = randomY + 'vh';
            
            // Slight tilt for organic look
            const randomRotate = (Math.random() * 30) - 15; 
            heartContainer.style.transform = `rotate(${randomRotate}deg)`;

            // Light Pink Heart SVG
            const heartSVG = `
                <svg viewBox="0 0 100 100" class="heart-shape">
                    <defs>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="2" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    <path d="M 50 85 C 50 85, 10 55, 10 25 C 10 10, 35 5, 50 20 C 65 5, 90 10, 90 25 C 90 55, 50 85, 50 85 Z" fill="#ffb6c1" filter="url(#glow)"/>
                </svg>
            `;
            heartContainer.innerHTML = heartSVG;

            const textArea = document.createElement('div');
            textArea.className = 'heart-text-area';
            
            const messageElement = document.createElement('p');
            messageElement.className = 'heart-message';
            messageElement.innerText = messageContent; 
            textArea.appendChild(messageElement);

            heartContainer.appendChild(textArea);
            garden.appendChild(heartContainer);
        }
